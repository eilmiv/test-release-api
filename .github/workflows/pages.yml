name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build versioned site from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"

          mkdir -p _site
          cp docs/index.html _site/index.html

          # Download assets for every release into a versioned subdirectory
          gh release list --repo "$REPO" --json tagName --jq '.[].tagName' | while read -r tag; do
            [ -n "$tag" ] || continue
            mkdir -p "_site/${tag}"
            if ! gh release download "${tag}" \
              --repo "$REPO" \
              -p 'example.owl' \
              -p 'example.ttl' \
              --dir "_site/${tag}" \
              --clobber; then
              echo "::warning::Could not download both assets for ${tag}."
            fi
          done

          # Populate latest/ from the release marked as latest and require both assets.
          LATEST=$(gh release list --repo "$REPO" \
            --json tagName,isLatest --jq '.[] | select(.isLatest) | .tagName')
          if [ -z "$LATEST" ]; then
            echo "::error::No latest release found."
            exit 1
          fi

          mkdir -p _site/latest
          gh release download "$LATEST" \
            --repo "$REPO" \
            -p 'example.owl' \
            -p 'example.ttl' \
            --dir _site/latest \
            --clobber

          for f in example.owl example.ttl; do
            if [ ! -s "_site/latest/${f}" ]; then
              echo "::error::Missing required latest asset: ${f}"
              exit 1
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
