on:
  push:
    tags:
      - 'v*'

name: Release

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate TTL file
        run: |
          pip install rdflib
          python3 -c "
          from rdflib import Graph
          g = Graph()
          g.parse('example.owl', format='xml')
          g.serialize('example.ttl', format='turtle')
          "

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload OWL Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./example.owl
          asset_name: example.owl
          asset_content_type: application/rdf+xml

      - name: Upload TTL Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./example.ttl
          asset_name: example.ttl
          asset_content_type: text/turtle

      - name: Update GitHub Pages docs
        run: |
          VERSION=${{ github.ref_name }}
          # Save generated files before switching branches
          cp example.owl /tmp/example.owl
          cp example.ttl /tmp/example.ttl
          # Switch to main to update docs/
          git fetch origin main
          git checkout main
          # Create versioned directory
          mkdir -p docs/${VERSION}
          cp /tmp/example.owl docs/${VERSION}/example.owl
          cp /tmp/example.ttl docs/${VERSION}/example.ttl
          # Update latest/ directory
          rm -rf docs/latest
          mkdir -p docs/latest
          cp /tmp/example.owl docs/latest/example.owl
          cp /tmp/example.ttl docs/latest/example.ttl
          # Commit and push to main (triggers pages deployment)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "chore: publish ${VERSION} files to docs"
          git push origin main
