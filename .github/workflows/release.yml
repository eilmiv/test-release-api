on:
  push:
    tags:
      - 'v*'

name: Release and Deploy Pages

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate TTL file
        run: |
          pip install rdflib
          python3 -c "
          from rdflib import Graph
          g = Graph()
          g.parse('example.owl', format='xml')
          g.serialize('example.ttl', format='turtle')
          "

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload OWL Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./example.owl
          asset_name: example.owl
          asset_content_type: application/rdf+xml

      - name: Upload TTL Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./example.ttl
          asset_name: example.ttl
          asset_content_type: text/turtle

  deploy_pages:
    name: Deploy GitHub Pages
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build versioned site from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          CURRENT_TAG="${{ github.ref_name }}"

          mkdir -p _site
          cp docs/index.html _site/index.html

          # Download assets for all releases to preserve versioned URLs.
          gh release list --repo "$REPO" --json tagName --jq '.[].tagName' | while read -r tag; do
            [ -n "$tag" ] || continue
            mkdir -p "_site/${tag}"
            if ! gh release download "$tag" \
              --repo "$REPO" \
              -p 'example.owl' \
              -p 'example.ttl' \
              --dir "_site/${tag}" \
              --clobber; then
              echo "::warning::Could not download both assets for ${tag}."
            fi
          done

          # The release that triggered this workflow must have both assets.
          mkdir -p "_site/${CURRENT_TAG}"
          gh release download "$CURRENT_TAG" \
            --repo "$REPO" \
            -p 'example.owl' \
            -p 'example.ttl' \
            --dir "_site/${CURRENT_TAG}" \
            --clobber

          for f in example.owl example.ttl; do
            if [ ! -s "_site/${CURRENT_TAG}/${f}" ]; then
              echo "::error::Missing required asset for ${CURRENT_TAG}: ${f}"
              exit 1
            fi
          done

          # Populate latest/ and fail if required assets are missing there.
          LATEST=$(gh release list --repo "$REPO" --json tagName,isLatest --jq '.[] | select(.isLatest) | .tagName')
          if [ -z "$LATEST" ]; then
            echo "::error::No latest release found."
            exit 1
          fi

          mkdir -p _site/latest
          gh release download "$LATEST" \
            --repo "$REPO" \
            -p 'example.owl' \
            -p 'example.ttl' \
            --dir _site/latest \
            --clobber

          for f in example.owl example.ttl; do
            if [ ! -s "_site/latest/${f}" ]; then
              echo "::error::Missing required latest asset: ${f}"
              exit 1
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

